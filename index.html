<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SNAKE BATTLE — Crypto PvP Game</title>
  <style>
    :root {
      --neon-purple: #b400ff;
      --neon-pink:   #ff00c8;
      --neon-blue:   #00d4ff;
      --bg:          #050508;
      --panel:       #0c0c14;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ─── HEADER ─── */
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: var(--panel);
      border-bottom: 1px solid rgba(180, 0, 255, 0.25);
    }
    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-transform: uppercase;
    }
    .counter {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 1px;
    }
    .counter span { color: var(--neon-blue); font-weight: 600; }

    /* ─── STAGE ─── */
    .stage {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: radial-gradient(ellipse at 50% 100%, rgba(100,0,200,.12) 0%, transparent 70%);
    }

    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      border-radius: 6px;
      box-shadow:
        0 0 40px rgba(180,0,255,.35),
        0 0 80px rgba(0,212,255,.15);
      transition: opacity .25s ease;
    }
    canvas.fading { opacity: 0; }

    /* ─── NAV ARROWS ─── */
    .nav-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid rgba(180,0,255,.5);
      background: rgba(12,12,20,.75);
      backdrop-filter: blur(6px);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s, box-shadow .2s, background .2s;
      z-index: 10;
    }
    .nav-btn:hover {
      border-color: var(--neon-purple);
      background: rgba(180,0,255,.18);
      box-shadow: 0 0 18px rgba(180,0,255,.5);
    }
    .nav-btn:active { transform: translateY(-50%) scale(.93); }
    .nav-btn.disabled { opacity: .25; pointer-events: none; }
    .nav-btn svg { width: 22px; height: 22px; fill: none; stroke: var(--neon-blue); stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
    .nav-prev { left: 16px; }
    .nav-next { right: 16px; }

    /* ─── LOADING SPINNER ─── */
    .spinner {
      position: absolute;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }
    .spinner.visible { display: flex; }
    .spinner-ring {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: var(--neon-purple);
      border-right-color: var(--neon-blue);
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner p { font-size: .8rem; color: rgba(255,255,255,.4); letter-spacing: 1px; }

    /* ─── PROGRESS BAR ─── */
    .progress-bar {
      flex-shrink: 0;
      height: 3px;
      background: rgba(255,255,255,.07);
      position: relative;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-purple), var(--neon-pink), var(--neon-blue));
      transition: width .3s ease;
      box-shadow: 0 0 8px var(--neon-purple);
    }

    /* ─── BOTTOM BAR ─── */
    footer {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--panel);
      border-top: 1px solid rgba(0,212,255,.12);
    }
    .dot-nav {
      display: flex;
      gap: 6px;
      align-items: center;
      max-width: calc(100vw - 32px);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .dot-nav::-webkit-scrollbar { display: none; }
    .dot {
      flex-shrink: 0;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,.18);
      cursor: pointer;
      transition: background .2s, transform .2s, box-shadow .2s;
    }
    .dot.active {
      background: var(--neon-purple);
      transform: scale(1.4);
      box-shadow: 0 0 8px var(--neon-purple);
    }
    .dot:hover:not(.active) {
      background: var(--neon-blue);
      box-shadow: 0 0 6px var(--neon-blue);
    }

    /* ─── KEYBOARD HINT ─── */
    .hint {
      position: absolute;
      bottom: 12px;
      right: 14px;
      font-size: .65rem;
      color: rgba(255,255,255,.2);
      letter-spacing: .5px;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">Snake Battle</div>
    <div class="counter">Slide <span id="pageNum">—</span> / <span id="pageTotal">—</span></div>
  </header>

  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="stage" id="stage">
    <div class="spinner visible" id="spinner">
      <div class="spinner-ring"></div>
      <p>Loading presentation…</p>
    </div>

    <canvas id="slide"></canvas>

    <button class="nav-btn nav-prev disabled" id="prevBtn" title="Previous (←)">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav-btn nav-next disabled" id="nextBtn" title="Next (→)">
      <svg viewBox="0 0 24 24"><polyline points="9 6 15 12 9 18"/></svg>
    </button>

    <div class="hint">← → arrows to navigate</div>
  </div>

  <footer>
    <div class="dot-nav" id="dotNav"></div>
  </footer>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    const PDF_PATH = 'https://github.com/mazetezr/snake-battle-presentation/releases/download/v1.0/-.SNAKE.BATTLE.Crypto.PvP.Game.pdf';

    const canvas      = document.getElementById('slide');
    const ctx         = canvas.getContext('2d');
    const spinner     = document.getElementById('spinner');
    const prevBtn     = document.getElementById('prevBtn');
    const nextBtn     = document.getElementById('nextBtn');
    const pageNumEl   = document.getElementById('pageNum');
    const pageTotalEl = document.getElementById('pageTotal');
    const progressFill= document.getElementById('progressFill');
    const dotNav      = document.getElementById('dotNav');
    const stage       = document.getElementById('stage');

    let pdfDoc   = null;
    let current  = 1;
    let total    = 0;
    let rendering= false;

    /* ── helpers ── */
    function setCounter(n) {
      pageNumEl.textContent  = n;
      pageTotalEl.textContent= total;
      progressFill.style.width = ((n / total) * 100) + '%';
      prevBtn.classList.toggle('disabled', n <= 1);
      nextBtn.classList.toggle('disabled', n >= total);
      document.querySelectorAll('.dot').forEach((d, i) => {
        d.classList.toggle('active', i + 1 === n);
        if (i + 1 === n) d.scrollIntoView({ inline: 'center', behavior: 'smooth' });
      });
    }

    function buildDots() {
      dotNav.innerHTML = '';
      for (let i = 1; i <= total; i++) {
        const d = document.createElement('div');
        d.className = 'dot' + (i === 1 ? ' active' : '');
        d.dataset.page = i;
        d.addEventListener('click', () => goTo(d.dataset.page | 0));
        dotNav.appendChild(d);
      }
    }

    /* ── render a page ── */
    async function renderPage(n) {
      if (rendering) return;
      rendering = true;

      canvas.classList.add('fading');
      await new Promise(r => setTimeout(r, 220));

      const page   = await pdfDoc.getPage(n);
      const stageW = stage.clientWidth  - 120;
      const stageH = stage.clientHeight - 20;
      const vp0    = page.getViewport({ scale: 1 });
      const dpr    = window.devicePixelRatio || 1;
      const scale  = Math.min(stageW / vp0.width, stageH / vp0.height);
      const vp     = page.getViewport({ scale });

      /* Physical pixels = CSS pixels × DPR for crisp rendering */
      canvas.width  = Math.floor(vp.width  * dpr);
      canvas.height = Math.floor(vp.height * dpr);
      canvas.style.width  = Math.floor(vp.width)  + 'px';
      canvas.style.height = Math.floor(vp.height) + 'px';

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      await page.render({ canvasContext: ctx, viewport: vp }).promise;

      canvas.classList.remove('fading');
      setCounter(n);
      rendering = false;
    }

    function goTo(n) {
      if (!pdfDoc || n < 1 || n > total || n === current) return;
      current = n;
      renderPage(current);
    }

    /* ── load PDF ── */
    pdfjsLib.getDocument(PDF_PATH).promise.then(async doc => {
      pdfDoc = doc;
      total  = doc.numPages;
      spinner.classList.remove('visible');
      canvas.style.display = 'block';
      buildDots();
      await renderPage(1);
    }).catch(err => {
      spinner.innerHTML = `<p style="color:var(--neon-pink)">⚠ Не удалось загрузить PDF<br><small>${err.message}</small></p>`;
    });

    /* ── events ── */
    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown')  goTo(current + 1);
    });

    /* ── touch swipe ── */
    let touchX = null;
    stage.addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, { passive: true });
    stage.addEventListener('touchend',   e => {
      if (touchX === null) return;
      const dx = e.changedTouches[0].clientX - touchX;
      if (Math.abs(dx) > 50) goTo(current + (dx < 0 ? 1 : -1));
      touchX = null;
    }, { passive: true });

    /* ── re-render on resize (debounced) ── */
    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => { if (pdfDoc) renderPage(current); }, 300);
    });
  </script>
</body>
</html>
